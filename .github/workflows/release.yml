name: Release to npm

on:
  release:
    types: [published]
  workflow_dispatch:

# Default to read-only. id-token: write is escalated only on the
# publish job that actually needs npm provenance signing.
permissions:
  contents: read

# Only one publish to npm at a time -- never two concurrent publishes
# of the same version. Don't cancel in progress: a half-rolled-back
# publish is worse than two queued.
concurrency:
  group: release-npm
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Biome check (lint + format)
        run: npx biome check .

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate
    # Trusted Publishing via npm provenance needs id-token: write.
    # contents: read is for checkout.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if version exists on npm
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if npm view promptguard-sdk@$VERSION version 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: npm ci

      - name: Build
        if: steps.check.outputs.exists == 'false'
        run: npm run build

      - name: Publish (Trusted Publishing)
        if: steps.check.outputs.exists == 'false'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
