name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'
      - '.editorconfig'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'
      - '.editorconfig'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only token. Per-job escalation only where required.
permissions:
  contents: read

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          # Built-in dependency cache; setup-node hashes package-lock.json
          # and restores ~/.npm. ~3-5x faster install on warm cache.
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Biome check (lint + format)
        run: npx biome check .

      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  validate-api-contract:
    name: Validate API Contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download OpenAPI spec
        id: download-spec
        continue-on-error: true
        env:
          SPEC_TOKEN: ${{ secrets.OPENAPI_SPEC_TOKEN }}
        run: |
          if [ -z "$SPEC_TOKEN" ]; then
            echo "OPENAPI_SPEC_TOKEN not set, skipping validation"
            exit 1
          fi
          curl -sfL \
            -H "Authorization: token $SPEC_TOKEN" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/acebot712/promptguard/contents/apps/docs/api-reference/openapi-developer.json?ref=main" \
            -o openapi-developer.json

      - name: Validate SDK types against spec
        if: steps.download-spec.outcome == 'success'
        run: npx ts-node tests/validate-openapi.ts openapi-developer.json

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify package
        run: npm pack --dry-run
