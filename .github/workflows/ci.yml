name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Biome check (lint + format)
        run: npx biome check .

      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run tests
        run: npm test

  validate-api-contract:
    name: Validate API Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Download OpenAPI spec
        run: |
          curl -sL https://raw.githubusercontent.com/acebot712/promptguard/main/apps/docs/api-reference/openapi-developer.json \
            -o openapi-developer.json

      - name: Validate SDK types against spec
        run: npx ts-node tests/validate-openapi.ts openapi-developer.json

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, validate-api-contract]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Verify package
        run: npm pack --dry-run
